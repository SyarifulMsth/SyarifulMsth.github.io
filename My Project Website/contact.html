        <!-- CONTACT US -->
        <div class="container-contact100">
			<div class="wrap-contact100">
				<form class="contact100-form validate-form">
					<span class="contact100-form-title">
						Contact Us
					</span>

					<label class="label-input100" for="first-name">Nama Lengkap *</label>
					<div class="wrap-input100 validate-input">
						<input id="first-name" class="input100" type="text" name="first-name" placeholder="Nama depan">
						<span class="focus-input100"></span>
					</div>
					<div class="wrap-input100 validate-input">
						<input class="input100" type="text" name="last-name" placeholder="Nama belakang">
						<span class="focus-input100"></span>
					</div>

					<label class="label-input100" for="email">Alamat Email *</label>
					<div class="wrap-input100 validate-input">
						<input id="email" class="input100" type="text" name="email" placeholder="contoh123@gmail.com">
						<span class="focus-input100"></span>
					</div>

					<label class="label-input100" for="phone">Nomor Telepon</label>
					<div class="wrap-input100">
						<input id="phone" class="input100" type="text" name="phone" placeholder="+62 123-1234-1234">
						<span class="focus-input100"></span>
					</div>

					<label class="label-input100" for="message">Pesan *</label>
					<div class="wrap-input100 validate-input">
                        <textarea id="message" class="input100" name="message" placeholder="Tulis pertanyaan atau saran Anda di sini.."></textarea>
						<span class="focus-input100"></span>
					</div>

					<div class="container-contact100-form-btn">
						<button class="contact100-form-btn">
							<span>Kirim pesan<i class="zmdi zmdi-arrow-right m-l-8"></i>
							</span>
						</button>
					</div>
				</form>
			</div>
		</div>
